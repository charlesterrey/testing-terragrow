<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="assets/logo.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TerraGrow — Testing</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'tg-dark': '#021130',
            'tg-dark-light': '#0a1f4a',
            'tg-primary': '#2563eb',
            'tg-primary-hover': '#1d4ed8',
            'tg-success': '#1cc172',
            'tg-warning': '#f59e0b',
            'tg-danger': '#ef4444',
            'tg-brand': '#074d43',
            'backgroundPrimary': '#ffffff',
            'backgroundSecondary': '#f8fafc',
            'backgroundTertiary': '#f1f5f9',
            'backgroundHover': '#e2e8f0',
            'backgroundRed': '#fef2f2',
            'backgroundAmber': '#fffbeb',
            'backgroundLime': '#f7fee7',
            'backgroundTeal': '#f0fdfa',
            'backgroundBlue': '#eff6ff',
            'backgroundZinc': '#f4f4f5',
            'neutral-100': '#fcfcfc',
            'neutral-200': '#efefef',
            'neutral-300': '#e5e5e5',
            'neutral-500': '#a7a7ae',
            'neutral-600': '#707078',
            'neutral-800': '#525259',
            'neutral-900': '#2a2a2d',
            'neutral-950': '#1d1e24',
          },
          fontFamily: {
            'sans': ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="min-h-screen font-sans text-neutral-950 antialiased" style="background:#fcfcfd">
  <!-- Animated gradient background -->
  <div class="fixed inset-0 -z-10 overflow-hidden">
    <div class="anim-gradient"></div>
  </div>
  <style>
    .anim-gradient {
      position: absolute;
      width: 200%;
      height: 200%;
      top: -50%;
      left: -50%;
      background: radial-gradient(ellipse at 30% 20%, rgba(37,99,235,0.04) 0%, transparent 50%),
                  radial-gradient(ellipse at 70% 60%, rgba(28,193,114,0.03) 0%, transparent 50%),
                  radial-gradient(ellipse at 50% 80%, rgba(37,99,235,0.03) 0%, transparent 40%);
      animation: gradientDrift 20s ease-in-out infinite alternate;
    }
    @keyframes gradientDrift {
      0% { transform: translate(0, 0) rotate(0deg); }
      33% { transform: translate(2%, -1%) rotate(1deg); }
      66% { transform: translate(-1%, 2%) rotate(-0.5deg); }
      100% { transform: translate(1%, -2%) rotate(0.5deg); }
    }

    /* Page load fade */
    .page-content { opacity: 0; transform: translateY(4px); transition: opacity 350ms ease-out, transform 350ms ease-out; }
    .page-content.visible { opacity: 1; transform: translateY(0); }
  </style>

  <!-- PAGE CONTENT (fades in) -->
  <div id="page-content" class="page-content">

  <!-- TOP BAR -->
  <div class="flex items-center justify-between px-10 py-3">
    <button id="logout-btn" class="text-sm text-neutral-950 border border-neutral-300 rounded-lg px-4 py-1.5 hover:bg-neutral-950 hover:text-white transition-colors">
      Déconnexion
    </button>
    <div class="flex items-center gap-2.5">
      <div class="text-right">
        <p id="user-name" class="text-sm font-medium text-neutral-950"></p>
        <p id="user-meta" class="text-[11px] text-neutral-500"></p>
      </div>
      <img src="assets/logo.svg" alt="TerraGrow" class="h-7 w-7">
    </div>
  </div>

  <!-- HERO + PROGRESS combined -->
  <div class="px-10 pt-3 pb-4">
    <h1 class="text-[28px] font-semibold text-neutral-950 leading-tight tracking-tight mb-1">
      Bonjour <span class="text-tg-primary" id="user-firstname"></span>,<br>
      bienvenue sur votre espace de test TerraGrow.
    </h1>
    <p class="text-base text-neutral-600 leading-relaxed mb-2">
      Suivez les étapes pour compléter tous les tests !
    </p>
    <div id="progress-section" class="flex items-end gap-10">
      <!-- JS -->
    </div>
  </div>

  <!-- DIVIDER -->
  <div class="border-t border-neutral-200"></div>

  <!-- TESTS GRID -->
  <div class="px-10 py-5">

    <!-- Filter / section selector -->
    <div class="flex items-center justify-between mb-4">
      <div class="flex items-center gap-1 bg-backgroundTertiary rounded-lg p-0.5">
        <button id="filter-all" class="filter-btn text-sm font-medium px-4 py-1.5 rounded-md bg-white text-neutral-950 shadow-sm transition-all">Tout</button>
        <button id="filter-agri" class="filter-btn text-sm font-medium px-4 py-1.5 rounded-md text-neutral-500 hover:text-neutral-800 transition-all">Agriculteur</button>
        <button id="filter-conseiller" class="filter-btn text-sm font-medium px-4 py-1.5 rounded-md text-neutral-500 hover:text-neutral-800 transition-all">Conseiller</button>
      </div>
      <div class="text-sm text-neutral-500">
        <span id="visible-count">23</span> journeys
      </div>
    </div>

    <!-- Cards grid -->
    <div id="tests-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 2xl:grid-cols-7 gap-3">
      <!-- JS -->
    </div>
  </div>

  <!-- FOOTER — credentials discret -->
  <div class="border-t border-neutral-200 px-10 py-4 flex items-center justify-between">
    <div class="flex items-center gap-6 text-xs text-neutral-400">
      <span>Environnement de test</span>
      <a href="https://preprod-conseil.terragrow.fr/login" target="_blank" class="underline hover:text-neutral-600">preprod-conseil.terragrow.fr</a>
      <span>Login : agri@demo.fr · advisor@demo.fr — Mot de passe : 0000</span>
    </div>
    <div class="flex items-center gap-3">
      <a href="admin.html" class="flex items-center gap-1.5 text-xs font-medium text-neutral-600 hover:text-neutral-950 border border-neutral-200 hover:border-neutral-300 px-3 py-1.5 rounded-md transition-colors">
          Vue admin
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-3 h-3"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5"/></svg>
        </a>
      <a href="recap.html" class="flex items-center gap-1.5 text-xs font-medium text-white bg-tg-dark hover:bg-tg-dark/80 px-4 py-1.5 rounded-md transition-colors">
        Voir le récapitulatif
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-3 h-3"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5"/></svg>
      </a>
    </div>
  </div>

  </div><!-- /page-content -->

  <div id="user-avatar" class="hidden"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/video-modal.js"></script>
</body>
</html>
